name: Reusable Publish Release

on:
  workflow_call:
    inputs:
      version: { required: true, type: string }
      tag: { required: true, type: string }
      commit: { required: true, type: string }
      binary-name: { required: true, type: string }
      display-name: { required: true, type: string }
      cargo-package: { required: true, type: string }
      environment-prefix: { required: true, type: string }
    secrets:
      dependency_token:
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    env:
      DEPENDENCY_TOKEN: ${{ secrets.dependency_token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, suffix: linux-x86_64 }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, suffix: linux-x86_64-musl }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, suffix: linux-aarch64 }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, suffix: linux-aarch64-musl }
          - { os: macos-latest, target: x86_64-apple-darwin, suffix: macos-x86_64 }
          - { os: macos-latest, target: aarch64-apple-darwin, suffix: macos-aarch64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, suffix: windows-x86_64.exe }
          - { os: windows-latest, target: aarch64-pc-windows-msvc, suffix: windows-aarch64.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - name: Authenticate private Cargo dependencies
        if: env.DEPENDENCY_TOKEN != ''
        shell: bash
        run: git config --global url."https://x-access-token:${DEPENDENCY_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux cross toolchain
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        uses: taiki-e/setup-cross-toolchain-action@v1.41.0
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }} --package ${{ inputs.cargo-package }}
      - name: Verify compiled release version
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          reported_version="$("target/${{ matrix.target }}/release/${{ inputs.binary-name }}" --version)"
          expected_version="${{ inputs.binary-name }} ${{ inputs.version }}"
          [[ "$reported_version" == "$expected_version" ]] || {
            echo "Expected '$expected_version', got '$reported_version'" >&2
            exit 1
          }
      - name: Prepare artifact
        shell: bash
        run: |
          binary="${{ inputs.binary-name }}"
          [[ "${{ runner.os }}" != Windows ]] || binary="${binary}.exe"
          artifact="${{ inputs.binary-name }}-${{ matrix.suffix }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${binary}" "dist/${artifact}"
          (cd dist && openssl dgst -sha256 -r "$artifact" > "$artifact.sha256")
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ inputs.binary-name }}-${{ matrix.suffix }}
          path: dist/*
          if-no-files-found: error
      - name: Remove private dependency credential
        if: always() && env.DEPENDENCY_TOKEN != ''
        shell: bash
        run: git config --global --unset-all url."https://x-access-token:${DEPENDENCY_TOKEN}@github.com/".insteadOf || true

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.commit }}
      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: cdenihan/rust-cli-release/actions/render-installers@v1.2.0
        with:
          binary-name: ${{ inputs.binary-name }}
          display-name: ${{ inputs.display-name }}
          repository: ${{ github.repository }}
          environment-prefix: ${{ inputs.environment-prefix }}
          output-directory: dist
      - name: Add installer checksums
        shell: bash
        run: |
          printf '%s\n' '${{ inputs.version }}' > dist/VERSION
          chmod 0755 dist/install.sh
          (cd dist && openssl dgst -sha256 -r VERSION > VERSION.sha256)
          (cd dist && openssl dgst -sha256 -r install.sh > install.sh.sha256)
          (cd dist && openssl dgst -sha256 -r install.ps1 > install.ps1.sha256)
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          tagged_commit="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha')"
          [[ "$tagged_commit" == "$RELEASE_COMMIT" ]] || {
            echo "Expected $RELEASE_TAG at $RELEASE_COMMIT, got $tagged_commit" >&2
            exit 1
          }
          gh release create "$RELEASE_TAG" dist/* --verify-tag \
            --title "${{ inputs.display-name }} $RELEASE_VERSION" --generate-notes

  cleanup_failed_tag:
    name: Clean up failed release reservation
    if: ${{ always() && needs.publish.result != 'success' }}
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Delete this run's unused reserved tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.commit }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 && exit 0
          reserved_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" --jq '.object.sha' 2>/dev/null || true)"
          [[ "$reserved_sha" != "$RELEASE_COMMIT" ]] ||
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${RELEASE_TAG}"
